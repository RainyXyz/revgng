  <script>
    const userId = '810175870958174258'; 
    const statusIndicator = document.querySelector('.status-indicator');
    const activityEl = document.querySelector('.activity');
    const nameEl = document.querySelector('.name .label');
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');
    const SCALE = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale')) || 1;

    const backgroundImages = [
      'https://file.garden/aijMuf93Yw424L-2/BG.gif',
      'https://file.garden/aijMuf93Yw424L-2/BG.gif',
      'https://file.garden/aijMuf93Yw424L-2/BG.gif',

    function setInitialProfile() {
      nameEl.textContent = "manto";
      document.title = "@manto";
      
      document.documentElement.style.setProperty('--pfp', `url('https://file.garden/aijMuf93Yw424L-2/PROFILE.gif')`);

    function setRandomBackground() {
      const randomBg = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];
      
      document.documentElement.style.setProperty('--bg', `url('${randomBg}')`);
      
      sessionStorage.setItem('currentBackground', randomBg);

    function initLanyard() {
      const socket = new WebSocket('wss://lanyard.rest/socket');
      let interval;

      socket.addEventListener('open', event => {
        socket.send(JSON.stringify({ op: 1 }));
        
        socket.send(JSON.stringify({
          op: 2,
          d: {
            subscribe_to_ids: [userId]
          }
        }));

        interval = setInterval(() => {
          socket.send(JSON.stringify({ op: 1 }));
        }, 30000);
      });

      socket.addEventListener('message', event => {
        const { t, d } = JSON.parse(event.data);

        if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') {
          updateProfile(d);
        }
      });

      socket.addEventListener('close', () => {
        clearInterval(interval);
        setTimeout(initLanyard, 5000);
      });
      
      socket.addEventListener('error', (error) => {
        console.error('Lanyard WebSocket error:', error);
      });
    }

    function updateProfile(data) {
      if (data.discord_user?.username) {
        const username = data.discord_user.username;
        nameEl.textContent = username;
        document.title = `@${username}`;
      }

      updateActivity(data.activities?.filter(activity => activity.type !== 4) || []);
    }

    function updateActivity(activities) {
      activityEl.classList.remove('show');
      
      if (activities.length === 0) return;
      
      const activity = activities[0];
      
      if (activity.name === 'Spotify' && activity.assets) {
        const track = activity.details || 'Unknown Track';
        const artist = activity.state || 'Unknown Artist';
        
        activityEl.innerHTML = `
          <div>Listening to <strong>${track}</strong></div>
          <div>by <strong>${artist}</strong></div>
        `;
        activityEl.className = 'activity spotify show';
        return;
      }
      
      if (activity.name) {
        let text = `<div>${activity.name}</div>`;
        
        if (activity.details) {
          text += `<div>${activity.details}</div>`;
        }
        
        if (activity.state) {
          text += `<div>${activity.state}</div>`;
        }
        
        activityEl.innerHTML = text;
        activityEl.className = 'activity playing show';
      }
    }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    let resizeScheduled = false;
    window.addEventListener('resize', () => {
      if (!resizeScheduled) {
        resizeScheduled = true;
        requestAnimationFrame(() => { resize(); resizeScheduled = false; });
      }
    });

    const snow = [];
    const snowCount = 100;
    function initSnow() {
      snow.length = 0;
      for (let i = 0; i < snowCount; i++) {
        snow.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.6 + 0.6,
          v: Math.random() * 0.5 + 0.3
        });
      }
    }
    initSnow();

    function drawSnow() {
      ctx.shadowColor = 'rgba(255,255,255,0.6)';
      ctx.shadowBlur = 6 * SCALE;
      for (const p of snow) {
        p.y += p.v;
        if (p.y - p.r > canvas.height) {
          p.y = -p.r;
          p.x = Math.random() * canvas.width;
        }
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * SCALE, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    const maxTrail = Math.round(100 * SCALE);
    const poolSize = 120;
    const trail = new Array(poolSize).fill(0).map(() => ({ x:0,y:0,r:0,life:0,decay:0,vx:0,vy:0,scale:1 }));
    let nextIdx = 0;

    window.addEventListener('mousemove', (e) => {
      for (let i = 0; i < 4; i++) {
        const p = trail[nextIdx++ % poolSize];
        p.x = e.clientX;
        p.y = e.clientY;
        p.r = (Math.random() * 1.4 + 0.6) * SCALE;
        p.life = 1;
        p.decay = Math.random() * 0.03 + 0.02;
        p.vx = (Math.random() - 0.5) * 0.6;
        p.vy = Math.random() * 0.8 + 0.3;
        p.scale = 1;
      }
    });

    function drawTrail() {
      ctx.shadowColor = 'rgba(255,255,255,0.8)';
      ctx.shadowBlur = 6 * SCALE;
      let active = 0;
      for (const p of trail) {
        if (p.life <= 0) continue;
        active++;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.01;
        p.life -= p.decay;
        p.scale = Math.max(0, p.life);
        ctx.globalAlpha = p.life;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.scale, 0, Math.PI * 2);
        ctx.fill();
        if (active > maxTrail) break;
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSnow();
      drawTrail();
      requestAnimationFrame(loop);
    }
    loop();

    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('light-theme');
      const isLight = body.classList.contains('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      body.classList.add('light-theme');
    }

    function updateVisitorCounter() {
      if (typeof(Storage) !== "undefined") {
        let count = localStorage.getItem('visitorCount') || 0;
        count = parseInt(count) + 1;
        localStorage.setItem('visitorCount', count);
        document.getElementById('visitorCount').textContent = count;
      }
    }
    
    function createCrackEffect() {
      const overlay = document.getElementById('crackOverlay');
      overlay.innerHTML = '';
      overlay.style.opacity = '1';
      
      for (let i = 0; i < 15; i++) {
        const crack = document.createElement('div');
        crack.className = 'crack';
        
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight;
        
        const width = Math.random() * 100 + 20;
        const height = Math.random() * 3 + 1;
        const rotation = Math.random() * 360;
        
        crack.style.left = `${x}px`;
        crack.style.top = `${y}px`;
        crack.style.width = `${width}px`;
        crack.style.height = `${height}px`;
        crack.style.transform = `rotate(${rotation}deg)`;
        
        overlay.appendChild(crack);
      }
      
      setTimeout(() => {
        overlay.style.transition = 'opacity 1s ease';
        overlay.style.opacity = '0';
        
        setTimeout(() => {
          overlay.innerHTML = '';
          overlay.style.transition = '';
        }, 1000);
      }, 800);
    }
    
    const profilePic = document.getElementById('profilePicture');
    profilePic.addEventListener('click', () => {
      createCrackEffect();
    });

    function addSeasonalDecorations() {
      const today = new Date();
      const month = today.getMonth() + 1;
      const day = today.getDate();
      
      if ((month === 12 && day >= 1) || (month === 1) || (month === 2 && day <= 28)) {
        createSnowflakes();
      }
      else if ((month === 3) || (month === 4) || (month === 5 && day <= 31)) {
        createFlowers();
      }
    }
    
    function createSnowflakes() {
      for (let i = 0; i < 30; i++) {
        const snowflake = document.createElement('div');
        snowflake.className = 'seasonal-decoration';
        snowflake.innerHTML = '❄';
        snowflake.style.left = Math.random() * 100 + 'vw';
        snowflake.style.fontSize = (Math.random() * 20 + 10) + 'px';
        snowflake.style.animation = `fall ${Math.random() * 10 + 5}s linear infinite`;
        snowflake.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(snowflake);
      }
      
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fall {
          to { transform: translateY(100vh) rotate(360deg); }
        }
      `;
      document.head.appendChild(style);
    }
    
    function createFlowers() {
      const flowers = ['🌸', '🌺', '🌻', '🌼'];
      for (let i = 0; i < 20; i++) {
        const flower = document.createElement('div');
        flower.className = 'seasonal-decoration';
        flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
        flower.style.left = Math.random() * 100 + 'vw';
        flower.style.fontSize = (Math.random() * 25 + 15) + 'px';
        flower.style.animation = `float ${Math.random() * 15 + 10}s linear infinite`;
        flower.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(flower);
      }
      
      const style = document.createElement('style');
      style.textContent = `
        @keyframes float {
          0% { transform: translateY(100vh) translateX(0); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translateY(-100px) translateX(${Math.random() > 0.5 ? '-' : ''}${Math.random() * 100}px); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    const warningOverlay = document.getElementById('warningOverlay');
    const closeWarning = document.getElementById('closeWarning');
    
    closeWarning.addEventListener('click', () => {
      warningOverlay.style.display = 'none';
    });
    
    let devtools = {
      open: false,
      orientation: null
    };
    
    const threshold = 160;
    
    setInterval(() => {
      if (window.outerHeight - window.innerHeight > threshold || 
          window.outerWidth - window.innerWidth > threshold) {
        if (!devtools.open) {
          devtools.open = true;
          showWarning();
        }
      } else {
        devtools.open = false;
      }
    }, 500);
    
    function showWarning() {
      warningOverlay.style.display = 'flex';
      createCrackEffect();
    }
    
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.key === 'F12') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.ctrlKey && e.shiftKey && e.key === 'J') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
      
      if (e.ctrlKey && e.shiftKey && e.key === 'K') {
        e.preventDefault();
        e.stopPropagation();
        showWarning();
        return false;
      }
    }, true);
    
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      e.stopPropagation();
      showWarning();
      return false;
    }, true);

    setInterval(() => {
      setRandomBackground();
    }, 300000);

    window.addEventListener('load', () => {
      setInitialProfile();
      initLanyard();
      updateVisitorCounter();
      addSeasonalDecorations();
      
      setRandomBackground();
    });

    const startScreen = document.getElementById("startScreen");
    const bgMusic = document.getElementById("bgMusic");

    startScreen.addEventListener("click", () => {
      startScreen.classList.add("hidden");
      setTimeout(() => startScreen.remove(), 700);

      bgMusic.volume = 0.75;
      bgMusic.play().catch(() => {});
    });
  </script>

</body>
</html>
