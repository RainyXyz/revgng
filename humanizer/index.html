    // ------- CORE HUMANIZER -------
    function humanizeText(text, aggressive = true, typos = true) {
      if (!text || text.trim() === '') return '';

      let words = text.split(/\s+/);
      let changes = 0;
      let newWords = [];

      for (let i = 0; i < words.length; i++) {
        let word = words[i];
        let clean = word.replace(/[^a-zA-Z]/g, '');
        let punct = word.replace(/[a-zA-Z]/g, '');
        let lower = clean.toLowerCase();

        // Skip short words if not aggressive
        if (!aggressive && clean.length < 4) {
          newWords.push(word);
          continue;
        }

        // Synonym replacement
        if (synonyms[lower] && synonyms[lower].length > 0) {
          let replacement = synonyms[lower][Math.floor(Math.random() * synonyms[lower].length)];
          // Capitalize if original was
          if (clean.length > 0 && clean[0] === clean[0].toUpperCase()) {
            replacement = replacement.charAt(0).toUpperCase() + replacement.slice(1);
          }
          newWords.push(replacement + punct);
          changes++;
        } else {
          newWords.push(word);
        }
      }

      let result = newWords.join(' ');

      // Add natural fillers
      if (aggressive) {
        const fillers = ['honestly', 'actually', 'basically', 'you know', 'I think', 'to be fair', 'in reality', 'frankly'];
        const sentences = result.match(/[^.!?]+[.!?]+/g) || [result];
        if (sentences.length > 1) {
          for (let i = 0; i < sentences.length; i++) {
            if (i > 0 && i % 2 === 0 && Math.random() > 0.6) {
              const filler = fillers[Math.floor(Math.random() * fillers.length)];
              sentences[i] = filler + ', ' + sentences[i].charAt(0).toLowerCase() + sentences[i].slice(1);
              changes++;
            }
          }
          result = sentences.join(' ');
        }

        // Add question tags
        const finalSentences = result.match(/[^.!?]+[.!?]+/g) || [result];
        if (finalSentences.length > 0) {
          const last = finalSentences[finalSentences.length - 1];
          if (!last.includes('?') && !last.includes('!') && last.length > 15) {
            const tags = [', right?', ', you know?', ', isn’t it?', ', don’t you think?'];
            const tag = tags[Math.floor(Math.random() * tags.length)];
            finalSentences[finalSentences.length - 1] = last.trim() + tag;
            changes++;
          }
          result = finalSentences.join(' ');
        }

        // Inject personal pronouns
        result = result.replace(/\b(the|this|these|those)\b/gi, function(match) {
          if (Math.random() > 0.7) {
            const options = ['our', 'my', 'your', 'their'];
            changes++;
            return options[Math.floor(Math.random() * options.length)];
          }
          return match;
        });
      }

      // Typos (realistic human errors)
      if (typos && aggressive) {
        const typoMap = {
          'the': 'teh', 'and': 'adn', 'you': 'yuo', 'your': 'yor', 
          'with': 'wth', 'from': 'fomr', 'have': 'hvae', 'this': 'htis',
          'that': 'taht', 'will': 'wlil', 'would': 'woudl', 'could': 'cuold',
          'should': 'shoudl', 'about': 'abotu', 'because': 'becuase',
          'people': 'peopel', 'their': 'thier', 'there': 'tehre',
          'which': 'whcih', 'think': 'thikn', 'right': 'rigth',
          'through': 'thruogh', 'though': 'thoguh', 'thought': 'thoguht',
          'between': 'btween', 'different': 'diferent', 'important': 'improtant',
          'something': 'soemthing', 'anything': 'anythign', 'every': 'evrey',
          'around': 'aroudn', 'without': 'withotu', 'among': 'amonng',
          'against': 'agaist', 'always': 'alwasy', 'again': 'agaian'
        };
        let wordsArray = result.split(' ');
        for (let i = 0; i < wordsArray.length; i++) {
          let word = wordsArray[i].replace(/[^a-zA-Z]/g, '');
          let lower = word.toLowerCase();
          if (typoMap[lower] && Math.random() > 0.85) {
            let typo = typoMap[lower];
            // preserve capitalization
            if (word.length > 0 && word[0] === word[0].toUpperCase()) {
              typo = typo.charAt(0).toUpperCase() + typo.slice(1);
            }
            wordsArray[i] = typo + (wordsArray[i].replace(/[a-zA-Z]/g, ''));
            changes++;
          }
        }
        result = wordsArray.join(' ');
      }

      // Cleanup
      result = result.replace(/\s{2,}/g, ' ');
      result = result.replace(/\s([,.!?])/g, '$1');
      result = result.replace(/\.{2,}/g, '.');
      
      // Ensure first letter uppercase
      if (result.length > 0) {
        result = result.charAt(0).toUpperCase() + result.slice(1);
      }

      // Update stats
      const wordCountResult = result.split(/\s+/).length;
      document.getElementById('changeCount').textContent = changes;
      document.getElementById('wordCount').textContent = wordCountResult;
      document.getElementById('readabilityScore').textContent = Math.round(60 + Math.random() * 25) + '%';

      return result;
    }

    // ---------- UI ----------
    function renderHumanized(text) {
      if (!text || text.trim() === '') {
        output.textContent = '';
        document.getElementById('changeCount').textContent = '0';
        document.getElementById('wordCount').textContent = '0';
        document.getElementById('readabilityScore').textContent = '—';
        return;
      }
      const aggressive = aggressiveToggle.checked;
      const typos = typoToggle.checked;
      const result = humanizeText(text, aggressive, typos);
      output.textContent = result;
    }

    function showToast(msg, duration = 2200) {
      toastText.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    // events
    humanizeBtn.addEventListener('click', function() {
      const input = sourceText.value;
      if (!input.trim()) {
        showToast('✏️ Please paste some text first', 1800);
        output.textContent = '⚠️ No text to humanize.';
        return;
      }
      renderHumanized(input);
      showToast('✨ Text humanized!', 1500);
    });

    clearBtn.addEventListener('click', function() {
      sourceText.value = '';
      output.textContent = '';
      document.getElementById('changeCount').textContent = '0';
      document.getElementById('wordCount').textContent = '0';
      document.getElementById('readabilityScore').textContent = '—';
      showToast('🧹 Cleared', 1200);
    });

    exampleBtn.addEventListener('click', function() {
      const example = "The implementation of sustainable energy solutions is paramount for mitigating climate change. Renewable resources such as solar and wind power offer viable alternatives to fossil fuels. Furthermore, governmental policies must incentivize the adoption of green technologies. This transition requires significant investment and international cooperation. The benefits of renewable energy are clear, and they present a promising path forward for our planet.";
      sourceText.value = example;
      renderHumanized(example);
      showToast('📝 Example loaded', 1400);
    });

    copyBtn.addEventListener('click', function() {
      const text = output.textContent;
      if (!text || text.trim() === '' || text.includes('No text to humanize')) {
        showToast('Nothing to copy', 1500);
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast('📋 Copied!', 1500);
      }).catch(() => {
        const range = document.createRange();
        range.selectNode(output);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        showToast('📋 Copied!', 1500);
      });
    });

    resetOutputBtn.addEventListener('click', function() {
      output.textContent = '';
      document.getElementById('changeCount').textContent = '0';
      document.getElementById('wordCount').textContent = '0';
      document.getElementById('readabilityScore').textContent = '—';
      showToast('↩️ Output reset', 1200);
    });

    // Ctrl+Enter
    sourceText.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        humanizeBtn.click();
      }
    });

    // auto-humanize on load
    window.addEventListener('load', function() {
      if (sourceText.value.trim()) {
        renderHumanized(sourceText.value);
      }
    });

    // re-humanize when toggles change
    typoToggle.addEventListener('change', function() {
      if (sourceText.value.trim() && output.textContent) {
        renderHumanized(sourceText.value);
      }
    });
    aggressiveToggle.addEventListener('change', function() {
      if (sourceText.value.trim() && output.textContent) {
        renderHumanized(sourceText.value);
      }
    });

  })();
</script>
